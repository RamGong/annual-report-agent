<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业年报结构化信息提取智能体</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>企业年报结构化信息提取智能体</h1>
        <p class="desc">基于阿里云通义千问大模型 · 批量提取资产负债表 / 管理层变动 / 财务附注</p>

        <div id="upload-area" class="upload-box">
            <p>拖拽年报PDF文件到此处，或点击选择文件</p>
            <button id="select-btn" class="blue-btn">选择PDF文件</button>
        </div>

        <div id="file-list" class="file-list"></div>
        <button id="extract-btn" class="green-btn" disabled>开始提取</button>

        <div id="status-section" class="hidden status-box">
            <p id="status-text"></p>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="result-section" class="hidden result-box">
            <div class="tab-group">
                <button class="tab-btn active" data-tab="balance">资产负债表</button>
                <button class="tab-btn" data-tab="management">管理层变动</button>
                <button class="tab-btn" data-tab="notes">财务附注</button>
            </div>

            <div class="tab-content" id="tab-balance">
                <div id="balance-table"></div>
            </div>
            <div class="tab-content hidden" id="tab-management">
                <div id="management-table"></div>
            </div>
            <div class="tab-content hidden" id="tab-notes">
                <div id="notes-content"></div>
            </div>

            <button id="export-btn" class="export-btn">导出Excel</button>
        </div>
    </div>

    <!-- Excel导出依赖 必须放在app.js前面 -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- 文件选择隐藏input -->
    <input type="file" id="file-input" accept=".pdf" hidden>
    <!-- 业务脚本 -->
    <script src="./app.js"></script>
</body>
</html>
